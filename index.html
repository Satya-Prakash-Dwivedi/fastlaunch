<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>FastLaunch - AI/ML, DevOps & Web Solutions</title>
    <meta name="description" content="Deploy intelligent systems in days. AI/ML, DevOps, mobile apps, and serverless solutions." />
    <link rel="canonical" href="https://fastlaunch.live" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fastlaunch.live" />
    <meta property="og:title" content="FastLaunch - Build Fast, Deploy Everywhere" />
    <meta property="og:description" content="AI/ML, DevOps, and scalable web/mobile apps." />
    <meta property="og:image" content="https://fastlaunch.live/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:domain" content="fastlaunch.live" />
    <meta property="twitter:url" content="https://fastlaunch.live" />
    <meta name="twitter:title" content="FastLaunch - Build Fast, Deploy Everywhere" />
    <meta name="twitter:description" content="AI/ML, DevOps, and scalable web/mobile apps." />
    <meta name="twitter:image" content="https://fastlaunch.live/og-image.jpg" />

    <link rel="icon" type="image/svg+xml" href="/logo/icon-03-silver.svg" />
    
    <!-- JSON-LD Schemas -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FastLaunch",
      "url": "https://fastlaunch.live",
      "logo": "https://fastlaunch.live/logo/icon-03-silver.svg",
      "description": "AI/ML solutions, DevOps automation, and scalable web/mobile apps.",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-800-123-4567",
        "contactType": "sales"
      },
      "sameAs": [
        "https://twitter.com/fastlaunch",
        "https://linkedin.com/company/fastlaunch"
      ]
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "name": "AI/ML Solutions",
      "provider": {
        "@type": "Organization",
        "name": "FastLaunch"
      },
      "description": "Custom neural networks, predictive models, and reinforcement learning systems.",
      "areaServed": "Global"
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How fast do you deliver?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We deliver in days, not months, with fully tested pipelines."
          }
        },
        {
          "@type": "Question",
          "name": "Do you handle payments integration?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, we integrate Stripe/PayPal seamlessly."
          }
        }
      ]
    }
    </script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Deploy AI Models in 7 Days",
      "step": [
        {
          "@type": "HowToStep",
          "text": "Define your AI model requirements."
        },
        {
          "@type": "HowToStep",
          "text": "We build and test the pipeline."
        }
      ]
    }
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
